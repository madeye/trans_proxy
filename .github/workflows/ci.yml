name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  macos:
    name: macOS (build + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --workspace

      - name: Test
        run: cargo test --release --workspace

  linux:
    name: Linux (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --workspace

      - name: Test
        run: cargo test --release --workspace

  e2e-linux:
    name: E2E Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install nftables
        run: sudo apt-get update && sudo apt-get install -y nftables

      - name: Build workspace
        run: cargo build --release --workspace

      - name: Run E2E tests
        run: sudo ./target/release/e2e

  e2e-gateway-docker:
    name: E2E Gateway (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Multi-container topology: a client routes through a trans_proxy gateway
      # (real PREROUTING redirect for TCP + TPROXY for UDP) to a WAN server.
      # Covers the forwarded-traffic path — including the SOCKS5 UDP ASSOCIATE
      # QUIC relay — that the loopback e2e structurally cannot reach.
      - name: Run docker gateway e2e
        run: ./scripts/docker_gateway_e2e.sh

  e2e-macos:
    name: E2E Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --release --workspace

      - name: Run E2E tests
        run: sudo ./target/release/e2e

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
